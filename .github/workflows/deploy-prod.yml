name: Deploy to Prod

on:
  push:
    branches:
      - main

concurrency:
  group: prod-deploy
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  deploy-prod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find related pull request
        id: find_pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const commitSha = context.sha;

            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: commitSha,
            });

            const mergedPr = prs.data.find(pr => pr.merged_at);

            if (mergedPr) {
              core.setOutput("number", mergedPr.number.toString());
              core.setOutput("found", "true");
            } else if (prs.data.length > 0) {
              core.setOutput("number", prs.data[0].number.toString());
              core.setOutput("found", "true");
            } else {
              core.setOutput("found", "false");
            }

      - name: Comment deployment started
        if: steps.find_pr.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number("${{ steps.find_pr.outputs.number }}"),
              body: `Started deployment to prod for commit \`${context.sha}\`.

            [View deployment run](${runUrl})`
            });

      - name: Mask sensitive values
        shell: bash
        run: |
          echo "::add-mask::${{ secrets.TS_OAUTH_CLIENT_ID }}"
          echo "::add-mask::${{ secrets.TS_AUDIENCE }}"
          echo "::add-mask::${{ secrets.PROD_HOST }}"
          echo "::add-mask::${{ secrets.PROD_SSH_KEY }}"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci
          ping: ${{ secrets.PROD_HOST }}

      - name: Set up SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on production host
        id: deploy_step
        shell: bash
        run: |
          set -euo pipefail
          set -o pipefail

          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o LogLevel=ERROR deploy@"${{ secrets.PROD_HOST }}" << 'EOF' 2>&1 | tee deploy.log
            set -euo pipefail

            cd /apartmentlab/prod-repo/apartmentlab
            git fetch origin main
            git reset --hard origin/main

            ./infra-down.sh
            ./infra-up.sh
            ./apps-restart.sh
          EOF

      - name: Save failure log snippet
        if: failure()
        id: failure_log
        shell: bash
        run: |
          {
            echo 'log_snippet<<EOF'
            tail -n 80 deploy.log || true
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Comment deployment success
        if: success() && steps.find_pr.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number("${{ steps.find_pr.outputs.number }}"),
              body: `✅ Deployed to prod for commit \`${context.sha}\`.

            [View deployment run](${runUrl})`
            });

      - name: Comment deployment failure
        if: failure() && steps.find_pr.outputs.found == 'true'
        uses: actions/github-script@v7
        env:
          LOG_SNIPPET: ${{ steps.failure_log.outputs.log_snippet }}
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const logSnippet = process.env.LOG_SNIPPET || "No log output captured.";

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number("${{ steps.find_pr.outputs.number }}"),
              body: `❌ Deployment FAILED for commit \`${context.sha}\`.

            [View deployment run](${runUrl})

            **Last log lines:**
            \`\`\`
            ${logSnippet}
            \`\`\`
            `
            });