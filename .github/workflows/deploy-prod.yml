name: Deploy to Prod

on:
  push:
    branches:
      - main

concurrency:
  group: prod-deploy
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  deploy-prod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find related pull request
        id: find_pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const commitSha = context.sha;

            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: commitSha,
            });

            if (prs.data.length > 0) {
              const pr = prs.data[0];
              core.setOutput("number", pr.number.toString());
              core.setOutput("found", "true");
            } else {
              core.setOutput("found", "false");
            }

      - name: Comment deployment started
        if: steps.find_pr.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number("${{ steps.find_pr.outputs.number }}"),
              body: `Started deployment to prod for commit \`${context.sha}\`.`
            });

      - name: Mask sensitive values
        run: |
          echo "::add-mask::${{ secrets.TS_OAUTH_CLIENT_ID }}"
          echo "::add-mask::${{ secrets.TS_AUDIENCE }}"
          echo "::add-mask::${{ secrets.PROD_HOST }}"
          echo "::add-mask::${{ secrets.PROD_SSH_KEY }}"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci
          ping: ${{ secrets.PROD_HOST }}

      - name: Set up SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on production host
        shell: bash
        run: |
          set -euo pipefail
          ssh -o LogLevel=ERROR deploy@"${{ secrets.PROD_HOST }}" << 'EOF'
            set -euo pipefail

            cd /apartmentlab/prod-repo/apartmentlab
            git fetch origin main
            git reset --hard origin/main

            ./apps-restart.sh
            ./infra-down.sh
            ./infra-up.sh
          EOF

      - name: Comment deployment success
        if: success() && steps.find_pr.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number("${{ steps.find_pr.outputs.number }}"),
              body: `✅ Deployed to prod for commit \`${context.sha}\`.`
            });

      - name: Comment deployment failure
        if: failure() && steps.find_pr.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number("${{ steps.find_pr.outputs.number }}"),
              body: `❌ Deployment FAILED for commit \`${context.sha}\`. Check the workflow logs for details.`
            })